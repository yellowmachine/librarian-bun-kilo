# Fly.io app config — librarian
# Antes de usar: fly apps create <nombre> y ajusta el campo app aquí.
# Secretos: fly secrets set KEY=value --app <nombre>
app = 'scholio-librarian'
primary_region = 'cdg'

[deploy]
  release_command = "bun scripts/migrate.ts"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    path = '/api/health'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
