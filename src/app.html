<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- Fuentes -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
			rel="stylesheet"
		/>

		<!-- PWA -->
		<meta name="theme-color" content="#f9f7f4" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="apple-mobile-web-app-title" content="Librarian" />

		<!-- Iconos Apple (no usan el manifest, requieren tags propias) -->
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />

		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
