name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    name: Check · Build · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost/ci'
          ORIGIN: 'https://ci.example.com'
          BETTER_AUTH_SECRET: 'ci-dummy-secret-not-used-at-build-time'

      - name: Unit tests
        run: bun run vitest run --project server
